name: Mutation Testing Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

jobs:
  mutation-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Verify package-lock.json exists
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev libjpeg-dev libpng-dev libtiff-dev libgif-dev librsvg2-dev libpoppler-cpp-dev libcairo2-dev libpango1.0-dev libjpeg8-dev build-essential

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U test_user && break
            echo "Waiting for Postgres... attempt $i/30"
            sleep 1
          done

      - name: Run database migrations
        run: npm run migrate:up 2>&1
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db

      - name: Run mutation tests
        run: npm run test:mutation
        timeout-minutes: 20
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          STELLAR_ISSUER_SECRET: S-DUMMY-SECRET-KEY-FOR-TESTING-PURPOSES-ONLY
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
          CI: true

      - name: Enforce mutation score threshold
        continue-on-error: true
        run: |
          if [ -f reports/mutation/mutation.json ]; then
            MUTATION_SCORE=$(cat reports/mutation/mutation.json | jq '.mutationScore' -r)
            echo "Mutation Score: $MUTATION_SCORE"
            if (( $(echo "$MUTATION_SCORE < 80" | bc -l) )); then
              echo "⚠️ Mutation score below threshold (80). Current: $MUTATION_SCORE"
              exit 1
            fi
          else
            echo "⚠️ Mutation report not found at reports/mutation/mutation.json"
            echo "Stryker reporters may not include 'json'. Check stryker.conf.json."
          fi
