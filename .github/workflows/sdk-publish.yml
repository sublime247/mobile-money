name: SDK Publish

on:
  push:
    tags:
      - "v*"
      - "[0-9]*.[0-9]*.[0-9]*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.2.3"
        required: true

concurrency:
  group: sdk-publish-${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-version:
    name: Resolve SDK version
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_url: ${{ steps.resolve.outputs.release_url }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve tag and version
        id: resolve
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            RAW_TAG="${{ github.event.release.tag_name }}"
            RELEASE_URL="${{ github.event.release.html_url }}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ github.event.inputs.tag }}"
            RELEASE_URL=""
          else
            RAW_TAG="${GITHUB_REF_NAME}"
            RELEASE_URL=""
          fi

          if [ -z "${RAW_TAG}" ]; then
            echo "Unable to resolve a release tag for SDK publishing." >&2
            exit 1
          fi

          VERSION="${RAW_TAG#v}"

          echo "checkout_ref=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"
          echo "tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing SDK version ${VERSION} from tag ${RAW_TAG}"

  publish-kotlin-sdk:
    name: Publish Kotlin SDK
    runs-on: ubuntu-latest
    needs: resolve-version
    environment: sdk-publish

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-version.outputs.checkout_ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Validate Maven Central credentials
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: |
          set -euo pipefail

          missing=0
          for secret_name in SONATYPE_USERNAME SONATYPE_PASSWORD GPG_SIGNING_KEY GPG_SIGNING_PASSWORD; do
            if [ -z "${!secret_name:-}" ]; then
              echo "Missing required secret: ${secret_name}" >&2
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Build API server
        run: npm run build

      - name: Start API server for OpenAPI generation
        run: |
          set -euo pipefail
          node dist/src/index.js &
          echo "API_PID=$!" >> "$GITHUB_ENV"
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          JWT_SECRET: ci-jwt-secret-32-chars-long-placeholder
          NODE_ENV: development
          PORT: 3000
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-session-secret-placeholder
          STELLAR_ISSUER_SECRET: S-DUMMY-SECRET-KEY-FOR-TESTING-PURPOSES-ONLY

      - name: Wait for API
        run: npx wait-on http://127.0.0.1:3000/health --timeout 30000
        continue-on-error: true

      - name: Generate Kotlin SDK package
        run: |
          set -euo pipefail
          npm install -g @openapitools/openapi-generator-cli@7.21.0 --ignore-scripts
          openapi-generator-cli generate \
            -i "$(curl -sf http://127.0.0.1:3000/docs/openapi.json -o /tmp/openapi.json && echo /tmp/openapi.json || echo public/openapi.json)" \
            -c sdk-config.yaml \
            -o sdk \
            --additional-properties=artifactVersion=${{ needs.resolve-version.outputs.version }}

      - name: Stop API server
        if: always()
        run: |
          if [ -n "${API_PID:-}" ]; then
            kill "${API_PID}" 2>/dev/null || true
          fi

      - name: Make Gradle wrapper executable
        working-directory: sdk
        run: chmod +x gradlew

      - name: Test Kotlin SDK
        working-directory: sdk
        run: ./gradlew test --no-daemon -Pversion=${{ needs.resolve-version.outputs.version }}

      - name: Publish Kotlin SDK to Maven Central
        working-directory: sdk
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        run: |
          ./gradlew publishMavenKotlinPublicationToSonatypeRepository \
            --no-daemon \
            -Pversion=${{ needs.resolve-version.outputs.version }}

      - name: Upload Kotlin SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-sdk-${{ needs.resolve-version.outputs.version }}
          path: |
            sdk/build/libs/*.jar
            sdk/build/publications/
          retention-days: 30

  publish-typescript-sdk:
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    needs: resolve-version
    environment: sdk-publish

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-version.outputs.checkout_ref }}

      - name: Set up Node.js with npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Validate npm credentials
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "Missing required secret: NPM_TOKEN" >&2
            exit 1
          fi

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Build API server
        run: npm run build

      - name: Start API server for OpenAPI generation
        run: |
          set -euo pipefail
          node dist/src/index.js &
          echo "API_PID=$!" >> "$GITHUB_ENV"
        env:
          DATABASE_URL: ${{ secrets.CI_DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          JWT_SECRET: ci-jwt-secret-32-chars-long-placeholder
          NODE_ENV: development
          PORT: 3000
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-session-secret-placeholder
          STELLAR_ISSUER_SECRET: S-DUMMY-SECRET-KEY-FOR-TESTING-PURPOSES-ONLY

      - name: Wait for API
        run: npx wait-on http://127.0.0.1:3000/health --timeout 30000
        continue-on-error: true

      - name: Generate TypeScript SDK package
        run: |
          set -euo pipefail
          npm install -g @openapitools/openapi-generator-cli@7.21.0 --ignore-scripts
          openapi-generator-cli generate \
            -i "$(curl -sf http://127.0.0.1:3000/docs/openapi.json -o /tmp/openapi.json && echo /tmp/openapi.json || echo public/openapi.json)" \
            -c sdk-config-ts.yaml \
            -o sdk-ts \
            --additional-properties=npmVersion=${{ needs.resolve-version.outputs.version }}

      - name: Stop API server
        if: always()
        run: |
          if [ -n "${API_PID:-}" ]; then
            kill "${API_PID}" 2>/dev/null || true
          fi

      - name: Install TypeScript SDK dependencies
        working-directory: sdk-ts
        run: npm install

      - name: Build TypeScript SDK
        working-directory: sdk-ts
        run: npm run build

      - name: Publish TypeScript SDK to npm
        working-directory: sdk-ts
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload TypeScript SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk-${{ needs.resolve-version.outputs.version }}
          path: |
            sdk-ts/dist/
            sdk-ts/package.json
          retention-days: 30

  publish-summary:
    name: Publish summary
    runs-on: ubuntu-latest
    needs: [resolve-version, publish-kotlin-sdk, publish-typescript-sdk]
    if: always()

    steps:
      - name: Summarize publish results
        run: |
          set -euo pipefail

          VERSION="${{ needs.resolve-version.outputs.version }}"
          TAG="${{ needs.resolve-version.outputs.tag }}"
          KOTLIN_RESULT="${{ needs.publish-kotlin-sdk.result }}"
          TS_RESULT="${{ needs.publish-typescript-sdk.result }}"
          RELEASE_URL="${{ needs.resolve-version.outputs.release_url }}"

          echo "## SDK Publish Summary - v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| SDK | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Kotlin (Maven Central) | ${KOTLIN_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| TypeScript (npm) | ${TS_RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** ${TAG}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${RELEASE_URL}" ]; then
            echo "**Release:** ${RELEASE_URL}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "**Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any publish job failed
        if: needs.publish-kotlin-sdk.result != 'success' || needs.publish-typescript-sdk.result != 'success'
        run: |
          echo "One or more SDK publish jobs failed. Check the job logs above."
          exit 1
