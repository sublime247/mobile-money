app:
  enabled: true
  replicaCount: 3
  image:
    repository: shantelpeters/mobile-money
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  prometheusScrape: true

worker:
  enabled: true
  replicaCount: 1
  image:
    repository: shantelpeters/mobile-money
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  keda:
    enabled: true
    minReplicas: 1
    maxReplicas: 20
    pollingInterval: 30
    cooldownPeriod: 60
    triggers:
      - type: prometheus
        metadata:
          serverAddress: http://prometheus-service.monitoring.svc.cluster.local:9090
          metricName: queue_depth_total
          query: sum(queue_depth_total)
          threshold: "20"
      - type: prometheus
        metadata:
          serverAddress: http://prometheus-service.monitoring.svc.cluster.local:9090
          metricName: queue_latency_critical
          query: max(queue_latency_ms) > 5000
          threshold: "1"
          activationThreshold: "0"
      - type: prometheus
        metadata:
          serverAddress: http://prometheus-service.monitoring.svc.cluster.local:9090
          metricName: transaction_queue_depth
          query: queue_depth{queue="transaction-processing"}
          threshold: "10"

redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true
    storageClass: null
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

config:
  nodeEnv: production
  port: 3000
  stellarNetwork: TESTNET
  compressionEnabled: "true"
  rateLimitWindowMs: 900000
  rateLimitMaxRequests: 100
  requestSizeLimit: 10mb
  prometheusScrape: true

secrets:
  enabled: true
  databaseUrl: ""
  redisUrl: ""
  sessionSecret: "change-this-secret"
  stellarIssuerSecret: "change-this-secret"
  mtnApiKey: ""
  mtnApiSecret: ""
  mtnSubscriptionKey: ""
  airtelApiKey: ""
  airtelApiSecret: ""
  orangeApiKey: ""
  orangeApiSecret: ""
  adminApiKey: ""
  oauthClientId: ""
  oauthClientSecret: ""
  oauthRedirectUri: ""
  oauthJwtSecret: ""

imagePullSecrets: []
podAnnotations: {}
serviceAnnotations: {}

workerCommand:
  - node
  - dist/src/queue/worker.js
