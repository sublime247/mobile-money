sonar.projectKey=Spagero763_mobile-money
sonar.organization=spagero763
sonar.projectName=mobile-money
sonar.projectVersion=1.0.0

# Source
sonar.sources=src
sonar.tests=src,tests
sonar.test.inclusions=src/**/__tests__/**/*.ts,tests/**/*.ts,**/*.test.ts,**/*.spec.ts
sonar.sourceEncoding=UTF-8

# TypeScript / Coverage
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.json

# Exclusions (non-app code)
sonar.exclusions=dist/**,node_modules/**,coverage/**,contracts/**,migrations/**,scripts/**,examples/**,docs/**,k8s/**,**/*.js,**/*.d.ts,src/index.ts

# Don't count test code as source
sonar.coverage.exclusions=src/**/__tests__/**,tests/**,**/*.test.ts,**/*.spec.ts,**/*.d.ts,src/index.ts
sonar.cpd.exclusions=src/**/__tests__/**,tests/**
